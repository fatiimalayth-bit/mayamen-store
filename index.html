<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميامين ستور | Miami Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --accent-light: #ff6b6b;
            --gold: #ffd700;
            --text: #f1f1f1;
            --text-muted: #b8b8b8;
            --card-bg: rgba(255,255,255,0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--secondary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-top: 5px;
        }

        .designer {
            color: var(--accent-light);
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 600;
        }

        /* Search & Filter */
        .controls {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid var(--secondary);
            border-radius: 50px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(233,69,96,0.2);
        }

        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 1.2rem;
        }

        .category-filter {
            padding: 15px 25px;
            border: 2px solid var(--secondary);
            border-radius: 50px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        .category-filter:focus {
            border-color: var(--accent);
        }

        /* Products Grid */
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--accent);
        }

        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image {
            transform: scale(1.1);
        }

        .product-info {
            padding: 20px;
        }

        .product-name-ar {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .product-name-en {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .product-code {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-description {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--accent-light);
        }

        .product-price .currency {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .no-price {
            font-size: 1rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--secondary);
            border-radius: 25px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
            transition: transform 0.3s;
        }

        .modal-close:hover {
            transform: rotate(90deg);
        }

        .modal-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 25px 25px 0 0;
        }

        .modal-info {
            padding: 30px;
        }

        .modal-name-ar {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--gold);
        }

        .modal-name-en {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .modal-code {
            background: var(--accent);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }

        .modal-description {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text);
            margin-bottom: 20px;
        }

        .modal-price {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-light);
            text-align: center;
            padding: 20px;
            background: var(--primary);
            border-radius: 15px;
        }

        .order-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .order-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--secondary);
            margin-top: 50px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .social-links a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 1.3rem;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-links a:hover {
            background: var(--accent);
            transform: translateY(-5px);
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer-designer {
            color: var(--accent-light);
            font-weight: 700;
            margin-top: 10px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: var(--text);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-muted);
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .error-state i {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .error-state h3 {
            color: var(--text);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .error-state button {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            .products-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                padding: 15px;
            }
            .product-image { height: 220px; }
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card {
            animation: fadeInUp 0.6s ease forwards;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <p style="margin-top: 20px; color: var(--text-muted);">جاري تحميل المنتجات...</p>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo">✨ ميامين ستور ✨</div>
        <div class="subtitle">Miami Store | جمال يشرق تحت شمس ميامي</div>
        <div class="designer">Designed & Developed By ENG.FATIMA</div>
    </header>

    <!-- Controls -->
    <div class="controls">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن منتج..." oninput="filterProducts()">
        </div>
        <select class="category-filter" id="categoryFilter" onchange="filterProducts()">
            <option value="all">كل الأقسام</option>
            <option value="shaving">أدوات حلاقة</option>
            <option value="hair_styling">أدوات تصفيف الشعر</option>
            <option value="hair_care">أدوات العناية بالشعر</option>
            <option value="makeup_brushes">فرش مكياج</option>
            <option value="nail_tools">أدوات الأظافر</option>
            <option value="makeup_sponges">إسفنجات مكياج</option>
            <option value="eyebrow_tools">أدوات الحواجب</option>
            <option value="eye_tools">أدوات العيون</option>
            <option value="skincare">أدوات العناية بالبشرة</option>
            <option value="cleaning_tools">أدوات تنظيف</option>
            <option value="bath_tools">أدوات الاستحمام</option>
        </select>
    </div>

    <!-- Products -->
    <div class="products-container" id="productsContainer">
        <!-- Products will be loaded here -->
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="productModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-info">
                <div class="modal-name-ar" id="modalNameAr"></div>
                <div class="modal-name-en" id="modalNameEn"></div>
                <div class="modal-code" id="modalCode"></div>
                <div class="modal-description" id="modalDescription"></div>
                <div class="modal-price" id="modalPrice"></div>
                <button class="order-btn" onclick="orderProduct()">
                    <i class="fas fa-shopping-cart"></i>
                    اطلب الآن
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="social-links">
            <a href="#" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" title="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="#" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        </div>
        <div class="footer-text">جميع الحقوق محفوظة © 2026 ميامين ستور</div>
        <div class="footer-designer">Designed & Developed By ENG.FATIMA</div>
    </footer>

    <script>
        // ============================================
        // Supabase Configuration - عدلي هنا
        // ============================================
        const SUPABASE_URL = 'https://aagjgmicuqotposwfuek.supabase.co';  // ← حطي رابط مشروعك
        const SUPABASE_KEY = 'sb_publishable_c8RaraZfqhmuDDRViIZstA_CivzP';  // ← حطي مفتاح anon key

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];
        let currentProduct = null;

        // Category display names (Arabic)
        const categoryNames = {
            'shaving': 'أدوات حلاقة',
            'hair_styling': 'أدوات تصفيف الشعر',
            'hair_care': 'أدوات العناية بالشعر',
            'makeup_brushes': 'فرش مكياج',
            'nail_tools': 'أدوات الأظافر',
            'makeup_sponges': 'إسفنجات مكياج',
            'eyebrow_tools': 'أدوات الحواجب',
            'eye_tools': 'أدوات العيون',
            'skincare': 'أدوات العناية بالبشرة',
            'cleaning_tools': 'أدوات تنظيف',
            'bath_tools': 'أدوات الاستحمام'
        };

        // Load products from Supabase
        async function loadProducts() {
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                allProducts = data || [];
                renderProducts(allProducts);
            } catch (err) {
                console.error('Error loading products:', err);
                showError('حدث خطأ في تحميل المنتجات. تأكدي من إعدادات Supabase.');
            } finally {
                document.getElementById('loadingScreen').classList.add('hidden');
            }
        }

        // Render products
        function renderProducts(products) {
            const container = document.getElementById('productsContainer');

            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>لا توجد منتجات</h3>
                        <p>لم يتم إضافة منتجات بعد</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map((product, index) => {
                const priceDisplay = product.price && product.price > 0 
                    ? `${product.price.toLocaleString()} <span class="currency">د.ع</span>`
                    : '<span class="no-price">السعر غير محدد</span>';

                return `
                <div class="product-card" style="animation-delay: ${index * 0.05}s" onclick="openModal(${product.id})">
                    <img class="product-image" src="${product.image_url || 'https://via.placeholder.com/400x400?text=No+Image'}" 
                         alt="${product.name_ar}" loading="lazy"
                         onerror="this.src='https://via.placeholder.com/400x400?text=Image+Error'">
                    <div class="product-info">
                        <div class="product-name-ar">${product.name_ar || 'بدون اسم'}</div>
                        <div class="product-name-en">${product.name_en || ''}</div>
                        <div class="product-code">كود: ${product.code || '---'}</div>
                        <div class="product-description">${product.description || ''}</div>
                        <div class="product-price">${priceDisplay}</div>
                    </div>
                </div>
            `}).join('');
        }

        // Filter products
        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;

            const filtered = allProducts.filter(p => {
                const matchesSearch = !search || 
                    (p.name_ar && p.name_ar.toLowerCase().includes(search)) ||
                    (p.name_en && p.name_en.toLowerCase().includes(search)) ||
                    (p.code && p.code.toLowerCase().includes(search));

                const matchesCategory = category === 'all' || p.category === category;

                return matchesSearch && matchesCategory;
            });

            renderProducts(filtered);
        }

        // Open modal
        function openModal(productId) {
            currentProduct = allProducts.find(p => p.id === productId);
            if (!currentProduct) return;

            document.getElementById('modalImage').src = currentProduct.image_url || '';
            document.getElementById('modalNameAr').textContent = currentProduct.name_ar || '';
            document.getElementById('modalNameEn').textContent = currentProduct.name_en || '';
            document.getElementById('modalCode').textContent = 'كود: ' + (currentProduct.code || '---');
            document.getElementById('modalDescription').textContent = currentProduct.description || '';

            const priceDisplay = currentProduct.price && currentProduct.price > 0
                ? currentProduct.price.toLocaleString() + ' <span class="currency">د.ع</span>'
                : 'السعر غير محدد';
            document.getElementById('modalPrice').innerHTML = priceDisplay;

            document.getElementById('productModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal(event) {
            if (!event || event.target === document.getElementById('productModal')) {
                document.getElementById('productModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // Order product
        function orderProduct() {
            if (!currentProduct) return;

            const priceText = currentProduct.price && currentProduct.price > 0
                ? `${currentProduct.price.toLocaleString()} د.ع`
                : 'السعر غير محدد';

            const message = `مرحباً، أريد طلب المنتج:
` +
                `الاسم: ${currentProduct.name_ar}
` +
                `الكود: ${currentProduct.code}
` +
                `السعر: ${priceText}`;

            // افتحي واتساب (غيري الرقم)
            const phone = '964XXXXXXXXXX';
            const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        // Show error
        function showError(message) {
            document.getElementById('productsContainer').innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>عذراً، حدث خطأ</h3>
                    <p>${message}</p>
                    <button onclick="location.reload()">إعادة المحاولة</button>
                </div>
            `;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>

</body>
</html>
